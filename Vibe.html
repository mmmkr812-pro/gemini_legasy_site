<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Test 4S</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .btn { 
            width: 80%; padding: 25px; margin: 10px; border: none; border-radius: 15px; 
            font-size: 20px; font-weight: bold; cursor: pointer; color: white;
        }
        .stop { background: #ff3b30; }
        .start { background: #34c759; }
        .pulse { background: #ff9500; }
    </style>
</head>
<body>
    <h1>📳 Vibe Hub</h1>
    <p>Спеціально для iPhone 4S</p>
    
    <button class="btn start" onclick="vibe(30000)">ПОСТІЙНА (30 сек)</button>
    <button class="btn pulse" onclick="vibe([500, 200, 500, 200, 500, 200, 500])">ПУЛЬСАЦІЯ</button>
    <button class="btn stop" onclick="vibe(0)">СТОП</button>

    <button class="btn start" onclick="vibe(10000)">ПУСК (10 сек)</button>

    <script>
        function vibe(ms) {
            if ("vibrate" in navigator) {
                  // Спроба через стандартний API
                navigator.vibrate(ms);
            } else {
                // Якщо не працює - виводимо інструкцію для iOS 9
                alert("iOS 9 блокує вібро в браузері. \n\nПорада: Зайди в Налаштування -> Звуки -> Вібрація і переконайся, що вона ввімкнена. \n\nАбо спробуй встановити додаток 'Vibrate' через App Store (Покупки).");
        }
    }
    </script>
</body>
</html>
