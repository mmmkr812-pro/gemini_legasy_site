<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Multi-Chat Dark</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --sidebar-bg: #171717;
            --container-bg: #1a1a1a;
            --user-bubble: #007aff;
            --ai-bubble: #2c2c2e;
            --text-color: #ffffff;
            --hint-color: #8e8e93;
            --border-color: #333;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg-color); color: var(--text-color);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* Бокова панель */
        #sidebar {
            width: 260px; background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; padding: 10px;
            transition: 0.3s;
        }

        .chat-item {
            padding: 10px; margin-bottom: 5px; border-radius: 8px;
            cursor: pointer; font-size: 14px; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent;
        }

        .chat-item:hover { background: #2a2a2a; }
        .chat-item.active { background: #2c2c2e; border-color: var(--user-bubble); }

        /* Основна зона */
        #main { flex: 1; display: flex; flex-direction: column; background: var(--bg-color); }

        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--user-bubble); border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: var(--ai-bubble); border-bottom-left-radius: 4px; }
        .system { align-self: center; color: var(--hint-color); font-size: 12px; }

        .controls { background: var(--container-bg); padding: 15px; border-top: 1px solid var(--border-color); }
        .input-row { display: flex; gap: 8px; margin-bottom: 8px; }

        input, select, button { 
            background: var(--input-bg); color: white; border: 1px solid var(--border-color);
            border-radius: 10px; padding: 10px; outline: none; background: #252525;
        }

        button { background: var(--user-bubble); font-weight: bold; cursor: pointer; border: none; }
        .btn-new { background: #34c759; margin-bottom: 15px; }
        .btn-sync { background: #5856d6; font-size: 11px; }

        @media (max-width: 600px) { #sidebar { display: none; } }
    </style>
</head>
<body>

    <div id="sidebar">
        <button class="btn-new" onclick="createNewChat()">+ Новий чат</button>
        <div id="chatList"></div>
    </div>

    <div id="main">
        <div id="chat"></div>
        
        <div class="controls">
            <div class="input-row">
                <input type="password" id="apiKey" placeholder="API Key" style="flex: 1;">
                <button class="btn-sync" onclick="fetchModels()">🔄 СИНХРОНІЗАЦІЯ</button>
            </div>
            <select id="modelSelect"><option value="">Спочатку синхронізуйте...</option></select>
            <div class="input-row" style="margin-top:8px;">
                <input type="text" id="userInput" placeholder="Повідомлення..." style="flex: 1;">
                <button onclick="send()">➤</button>
            </div>
        </div>
    </div>

    <script>
        var chats = JSON.parse(localStorage.getItem('gemini_history') || '[]');
        var currentChatId = localStorage.getItem('current_chat_id') || null;
        var base64Img = "";

        window.onload = function() {
            var key = localStorage.getItem("g_key");
            if (key) {
                document.getElementById('apiKey').value = key;
                fetchModels();
            }
            renderChatList();
            if (currentChatId) loadChat(currentChatId);
        };

        function createNewChat() {
            var id = Date.now().toString();
            var newChat = { id: id, title: "Новий чат " + (chats.length + 1), messages: [] };
            chats.unshift(newChat);
            saveData();
            loadChat(id);
            renderChatList();
        }

        function loadChat(id) {
            currentChatId = id;
            localStorage.setItem('current_chat_id', id);
            var chatData = chats.find(c => c.id === id);
            var chatDiv = document.getElementById('chat');
            chatDiv.innerHTML = "";
            chatData.messages.forEach(m => addMsgToUI(m.role, m.text, m.type));
            renderChatList();
        }

        function renderChatList() {
            var list = document.getElementById('chatList');
            list.innerHTML = "";
            chats.forEach(c => {
                var div = document.createElement('div');
                div.className = "chat-item" + (c.id === currentChatId ? " active" : "");
                div.innerText = c.title;
                div.onclick = () => loadChat(c.id);
                list.appendChild(div);
            });
        }

        function saveData() {
            localStorage.setItem('gemini_history', JSON.stringify(chats));
            localStorage.setItem("g_key", document.getElementById('apiKey').value);
        }

        function addMsgToUI(role, text, type) {
            var chat = document.getElementById('chat');
            var div = document.createElement('div');
            div.className = "msg " + type;
            div.innerHTML = "<b>" + role + ":</b><br>" + text.replace(/\n/g, "<br>");
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function fetchModels() {
            var key = document.getElementById('apiKey').value;
            if (!key) return;
            saveData();
            var url = "https://generativelanguage.googleapis.com/v1beta/models?key=" + key;
            var xhr = new XMLHttpRequest();
            xhr.open("GET", url, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var res = JSON.parse(xhr.responseText);
                    var select = document.getElementById('modelSelect');
                    select.innerHTML = "";
                    res.models.forEach(m => {
                        if (m.supportedGenerationMethods.indexOf("generateContent") !== -1) {
                            var opt = document.createElement('option');
                            opt.value = m.name; opt.text = m.displayName;
                            select.appendChild(opt);
                        }
                    });
                }
            };
            xhr.send();
        }

        function send() {
            var text = document.getElementById('userInput').value;
            var model = document.getElementById('modelSelect').value;
            var key = document.getElementById('apiKey').value;
            if (!text || !currentChatId) return;

            var currentChat = chats.find(c => c.id === currentChatId);
            currentChat.messages.push({ role: "Ви", text: text, type: "user" });
            if (currentChat.messages.length === 1) currentChat.title = text.substring(0, 20) + "...";
            
            addMsgToUI("Ви", text, "user");
            document.getElementById('userInput').value = "";

            var url = "https://generativelanguage.googleapis.com/v1beta/" + model + ":generateContent?key=" + key;
            var xhr = new XMLHttpRequest();
            xhr.open("POST", url, true);
            xhr.setRequestHeader("Content-Type", "application/json");

            var history = currentChat.messages.map(m => ({
                role: m.type === "user" ? "user" : "model",
                parts: [{ text: m.text }]
            }));

            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var res = JSON.parse(xhr.responseText);
                    var aiText = res.candidates[0].content.parts[0].text;
                    currentChat.messages.push({ role: "Gemini", text: aiText, type: "ai" });
                    addMsgToUI("Gemini", aiText, "ai");
                    saveData();
                }
            };
            xhr.send(JSON.stringify({ contents: history }));
        }
    </script>
</body>
</html>
